<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: var(--page-glow);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .hd {
        position: sticky;
        top: 0;
        padding: 8px 12px 0;
      }
      .inner {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 24px;
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        background: var(--glass-bg-strong);
        box-shadow: var(--glass-shadow);
        backdrop-filter: var(--glass-filter);
      }
      .logo {
        display: inline-flex;
        align-items: center;
        font-weight: 600;
        font-size: 16px;
      }
      nav {
        display: flex;
        gap: 18px;
        font-size: 14px;
        margin-left: auto;
      }
      nav a {
        color: #6b6b72;
        text-decoration: none;
      }
      nav a:hover {
        color: #1a1a1f;
      }
      .gh {
        font-size: 13px;
        color: #6b6b72;
        text-decoration: none;
        padding: 6px 10px;
        border-radius: 6px;
      }
      .gh:hover {
        background: #e6e5dd;
        color: #1a1a1f;
      }
    </style>
  </head>
  <body>
    <div class="hd">
      <div class="inner">
        <div class="logo">Zotero‑Cat</div>
        <nav><a>Features</a><a>Guide</a><a>Download</a><a>FAQ</a></nav>
        <a class="gh">GitHub ↗</a>
      </div>
    </div>
    <div style="height: 80px"></div>
  </body>
</html>
