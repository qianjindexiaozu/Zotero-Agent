<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #15151a;
        font-family: var(--font-mono);
        color: #e8e8ec;
      }
      .label {
        font-family: var(--font-sans);
        font-size: 11px;
        color: #888892;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
        font-weight: 600;
      }
      pre {
        margin: 0 0 14px;
        font-size: 14px;
        line-height: 1.6;
      }
      .accent {
        color: #5aa3f5;
      }
      .muted {
        color: #888892;
      }
    </style>
  </head>
  <body>
    <div class="label">JetBrains Mono · code and runtime numerics</div>
    <pre>await <span class="accent">zoteroCat</span>.chat(item, context)</pre>
    <pre>const <span class="accent">cat</span> = await zotero.<span class="accent">read</span>(item)</pre>
    <pre><span class="muted">2.4s</span> · 1,284 tokens · gpt-4o</pre>
  </body>
</html>
